<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gfx-lab</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          onload="renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false}
            ],
            macros: {
              '\\R': '\\mathbb{R}',
              '\\vec': '\\mathbf{#1}',
              '\\mat': '\\mathbf{#1}'
            }
          });"></script>

  <!-- Prism.js (Nord theme) — syntax highlighting for modal code blocks -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-nord.css" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>

  <!-- Import Maps for Three.js (ESM) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* Nord colour palette */
    :root {
      --nord0:  #2E3440;
      --nord1:  #3B4252;
      --nord2:  #434C5E;
      --nord3:  #4C566A;
      --nord4:  #D8DEE9;
      --nord5:  #E5E9F0;
      --nord6:  #ECEFF4;
      --nord7:  #8FBCBB;
      --nord8:  #88C0D0;
      --nord9:  #81A1C1;
      --nord10: #5E81AC;
      --nord11: #BF616A;
      --nord12: #D08770;
      --nord13: #EBCB8B;
      --nord14: #A3BE8C;
      --nord15: #B48EAD;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--nord0);
      color: var(--nord4);
      font-family: 'JetBrains Mono', monospace, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    canvas { display: block; }

    #info {
      position: absolute;
      top: 1rem;
      left: 1rem;
      color: var(--nord8);
      font-size: 0.85rem;
    }

    #toolbar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.75rem 1rem;
      border: 1px solid var(--nord3);
      border-radius: 999px;
      background: rgba(59, 66, 82, 0.88);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    #toolbar label,
    #toolbar select,
    #toolbar button {
      font: inherit;
    }

    #toolbar select,
    #toolbar button,
    .modal-toggle {
      border: 1px solid var(--nord3);
      border-radius: 999px;
      background: var(--nord1);
      color: var(--nord6);
      padding: 0.45rem 0.8rem;
    }

    .icon-button {
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
    }

    #math-modal[hidden] {
      display: none;
    }

    #math-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(46, 52, 64, 0.78);
      z-index: 50;
    }

    .modal-panel {
      width: min(720px, calc(100vw - 2rem));
      max-height: calc(100vh - 2rem);
      overflow: auto;
      background: var(--nord1);
      border: 1px solid var(--nord3);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      padding: 1.25rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .modal-header h2 {
      font-size: 1rem;
      color: var(--nord8);
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .modal-body {
      display: grid;
      gap: 0.85rem;
      line-height: 1.7;
      color: var(--nord5);
    }

    .modal-body pre[class*="language-"] {
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.82rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- GitHub Ribbon：將 href 替換為你的 repo URL -->
  <!-- 顏色可換：forkme_right_red_aa0000 / forkme_right_green_007200 / forkme_right_darkblue_121621 -->
  <a href="https://github.com/YOUR_USERNAME/YOUR_REPO" target="_blank" rel="noopener">
    <img loading="lazy" decoding="async" width="149" height="149"
         style="position:fixed;top:0;right:0;border:0;z-index:9999;"
         src="https://github.blog/wp-content/uploads/2008/12/forkme_right_darkblue_121621.png"
         alt="Fork me on GitHub">
  </a>

  <div id="info">gfx-lab | Three.js + KaTeX + Nord</div>
  <div id="toolbar" aria-label="Tool controls">
    <label for="render-mode">Render Mode</label>
    <select id="render-mode">
      <option value="wireframe">Wireframe</option>
      <option value="solid">Solid</option>
    </select>
    <button id="pause-button" type="button">Pause Rotation</button>
    <button id="open-math" class="icon-button" type="button" aria-haspopup="dialog" aria-controls="math-modal" aria-label="Explain the math">💡</button>
  </div>
  <canvas id="canvas"></canvas>

  <div id="math-modal" role="dialog" aria-modal="true" aria-labelledby="math-title" hidden>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 id="math-title">Math Behind the Scene</h2>
        <div class="modal-actions">
          <button id="language-toggle" class="modal-toggle" type="button">Eng/中</button>
          <button id="close-math" class="modal-toggle" type="button" aria-label="Close">Close</button>
        </div>
      </div>
      <div id="math-content" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
